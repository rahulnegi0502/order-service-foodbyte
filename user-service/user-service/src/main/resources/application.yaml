server:
  port: 8081

spring:
  application:
    name: user-service

  # PostgreSQL
  datasource:
    url: jdbc:postgresql://localhost:5433/userdb
    username: postgres
    password: postgres

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc.time_zone: Asia/Kolkata

  flyway:
    enabled: true
    locations: classpath:db/migration
  # Redis
  data:
    redis:
      host: localhost
      port: 6379


  # Kafka
  kafka:
    bootstrap-servers: localhost:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
    consumer:
      group-id: user-service-group
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      auto-offset-reset: earliest

# JWT config (custom — not Spring property)
jwt:
  secret: foodbyte-super-secret-key-minimum-256-bits-long
  expiration: 3600000        # 1 hour in ms
  refresh-expiration: 604800000  # 7 days in ms

otp:
  ttl-seconds: 300